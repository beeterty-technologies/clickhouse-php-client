name: Release

on:
  push:
    tags:
      - 'v*'

jobs:

  # ── Gate ────────────────────────────────────────────────────────────────────
  # The release job will not run until every matrix leg of `test` passes.
  # If any PHP version fails, the release is blocked.
  test:
    uses: ./.github/workflows/test.yml

  # ── Release ─────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: test               # hard gate — both PHP 8.2 and 8.3 must be green

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Determine version type from the tag ─────────────────────────────────
      #
      # Supported tag patterns:
      #   v1.0.0           → stable, classified as major / minor / patch
      #   v1.0.0-alpha.1   → alpha  (pre-release)
      #   v1.0.0-beta.2    → beta   (pre-release)
      #   v1.0.0-rc.1      → release candidate (pre-release)
      #   v1.0.0-anything  → generic pre-release
      #
      - name: Determine version type
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          if [[ "$VERSION" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)(-(.+))?$ ]]; then
            MAJOR="${BASH_REMATCH[1]}"
            MINOR="${BASH_REMATCH[2]}"
            PATCH="${BASH_REMATCH[3]}"
            PRE_ID="${BASH_REMATCH[5]}"

            if [[ -n "$PRE_ID" ]]; then
              # ── Pre-release ────────────────────────────────────────────────
              PRERELEASE=true
              if   [[ "$PRE_ID" =~ ^alpha ]]; then TYPE="alpha"; LABEL="Alpha";
              elif [[ "$PRE_ID" =~ ^beta  ]]; then TYPE="beta";  LABEL="Beta";
              elif [[ "$PRE_ID" =~ ^rc    ]]; then TYPE="rc";    LABEL="Release Candidate";
              else                                 TYPE="pre";   LABEL="Pre-release";
              fi
            else
              # ── Stable release ─────────────────────────────────────────────
              PRERELEASE=false
              if   [[ "$MINOR" == "0" && "$PATCH" == "0" ]]; then TYPE="major"; LABEL="Major Release";
              elif [[ "$PATCH" == "0" ]];                     then TYPE="minor"; LABEL="Minor Release";
              else                                                 TYPE="patch"; LABEL="Patch";
              fi
            fi
          else
            # Fallback for non-semver tags
            TYPE="release"; LABEL="Release"; PRERELEASE=false
          fi

          echo "type=$TYPE"             >> $GITHUB_OUTPUT
          echo "label=$LABEL"           >> $GITHUB_OUTPUT
          echo "prerelease=$PRERELEASE" >> $GITHUB_OUTPUT
          echo "version=$VERSION"       >> $GITHUB_OUTPUT

          echo "### Version info"                       >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |"                      >> $GITHUB_STEP_SUMMARY
          echo "|---|---|"                               >> $GITHUB_STEP_SUMMARY
          echo "| Tag         | \`$TAG\`       |"       >> $GITHUB_STEP_SUMMARY
          echo "| Version     | \`$VERSION\`   |"       >> $GITHUB_STEP_SUMMARY
          echo "| Type        | \`$TYPE\`      |"       >> $GITHUB_STEP_SUMMARY
          echo "| Label       | $LABEL         |"       >> $GITHUB_STEP_SUMMARY
          echo "| Pre-release | $PRERELEASE    |"       >> $GITHUB_STEP_SUMMARY

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ github.ref_name }} — ${{ steps.version.outputs.label }}"
          prerelease: ${{ steps.version.outputs.prerelease }}
          generate_release_notes: true
