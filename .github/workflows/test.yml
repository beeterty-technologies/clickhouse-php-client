name: Tests

on:
  workflow_call:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ── Unit tests ──────────────────────────────────────────────────────────────
  # Runs on PHP 8.2 and 8.3. No external services needed.
  unit:
    name: Unit — PHP ${{ matrix.php }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: curl, json
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: php-${{ matrix.php }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: php-${{ matrix.php }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --no-progress

      - name: Run unit tests
        run: vendor/bin/phpunit -c phpunit.xml.dist --testsuite Unit --colors=never

  # ── Integration tests ───────────────────────────────────────────────────────
  # Spins up the official ClickHouse Docker image and runs the full client
  # and schema integration suite against it.
  integration:
    name: Integration — ClickHouse ${{ matrix.clickhouse }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        clickhouse: ['24.8', '25.1', 'latest']

    services:
      clickhouse:
        image: clickhouse/clickhouse-server:${{ matrix.clickhouse }}
        env:
          CLICKHOUSE_PASSWORD: clickhouse
        ports:
          - 8123:8123
        options: >-
          --ulimit nofile=262144:262144
          --health-cmd "clickhouse-client --user default --password clickhouse --query 'SELECT 1'"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
          --health-start-period 10s

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: curl, json
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: php-8.3-composer-${{ hashFiles('composer.lock') }}
          restore-keys: php-8.3-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Wait for ClickHouse to be ready
        run: |
          echo "Waiting for ClickHouse..."
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8123/ping; then
              echo "ClickHouse is ready."
              exit 0
            fi
            echo "Attempt $i/30 — sleeping 2s..."
            sleep 2
          done
          echo "ClickHouse did not become ready in time." && exit 1

      - name: Run integration tests
        env:
          CLICKHOUSE_HOST:     127.0.0.1
          CLICKHOUSE_PORT:     8123
          CLICKHOUSE_DB:       default
          CLICKHOUSE_USERNAME: default
          CLICKHOUSE_PASSWORD: clickhouse
        run: vendor/bin/phpunit -c phpunit.xml.dist --testsuite Integration --colors=never
